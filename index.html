<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- 🟢 ナビゲーションバー（Streech共通 #00d631） -->
  <header>
    <div class="header-left">
      <div class="logo-container">
        <img src="./streechlogo.svg" alt="Streech" class="logo-image">
      </div>
    </div>
  </header>

  <!-- 🔍 404メインGUIエリア（ゴナちゃんのビジュアルのみに凝縮） -->
  <main id="error-container">
    <div class="error-visual-area">
      
      <!-- CSSだけで完全に再現した本物のゴナちゃん（困りモード） -->
      <div class="css-gona-wrapper">
        <!-- 頭の上のゆらゆら揺れるハテナ -->
        <div class="question-mark">?</div>
        
        <!-- 特徴的な2本の耳 -->
        <div class="gona-ear-left"></div>
        <div class="gona-ear-right"></div>
        
        <!-- 緑色の丸っこいテレビ型フレーム（頭部） -->
        <div class="gona-outer-head">
          <!-- 内側の白い画面エリア -->
          <div class="gona-inner-face">
            <!-- 困っている「ハの字」の眉毛 -->
            <div class="gona-eyebrow left"></div>
            <div class="gona-eyebrow right"></div>
            <!-- 本物通りのシンプルな2つの黒丸目 -->
            <div class="gona-real-eye left"></div>
            <div class="gona-real-eye right"></div>
          </div>
        </div>
      </div>

      <!-- エラーコードバッジ -->
      <div class="error-code-badge">ERROR: 404</div>
    </div>
  </main>

</body>
</html>
